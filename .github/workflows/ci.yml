name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Download latest irij.jar
        run: gh release download --repo aldebogdanov/irij --pattern 'irij.jar' --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up vrata as local dep for tests
        run: |
          mkdir -p tests
          printf '[deps.vrata]\npath = ".."\n' > tests/irij.toml

      - name: Run tests
        run: java -jar irij.jar --no-spec-lint tests/test-html.irj
